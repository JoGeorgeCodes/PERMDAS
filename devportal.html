<!DOCTYPE html> 
<html>
<head>
	<meta charset="UTF-8">
	<title>Dev Portal</title>
</head>
<body>
	<h2>Dev Portal Controls</h2>

	<button onclick="restartServer()">Restart Server</button>
	<button onclick="updateServer()">Overwrite Server File From GitHub</button>

	<pre id="status"></pre>

	<script src="config.js"></script>
	<script src="devportal_config.js"></script>
	<script>
	const statusEl = document.getElementById("status");

	function setStatus(msg) {
		statusEl.textContent = msg;
	}

	async function restartServer() {
		setStatus("Sending restart request...");
		try {
			const res = await fetch(devportal_API + "/devportal-restart", {
				method: "POST"
			});
			const text = await res.text();
			setStatus("Restart response: " + text);
		} catch (e) {
			setStatus("Restart failed: " + e);
		}
	}

	async function updateServer() {
		setStatus("Sending overwrite request...");
		try {
			const res = await fetch(devportal_API + "/dev-update-from-github", {
				method: "POST"
			});
			const text = await res.text();
			setStatus("Update response: " + text);
		} catch (e) {
			setStatus("Update failed: " + e);
		}
	}
	</script>
</body>
</html>
