<!DOCTYPE html>
<html>
  <head>
    <style>
      .back{
        backdrop-filter: blur(10px);
        padding: 15px 50px 15px 80px;
        clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%);
        position: absolute;
        color: red;
        background-color:rgba(0, 0, 0, 0.3);
        top: 0px;
        left: -50px;
        font-size: 30px;
        border: none;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        transition: all 0.3s ease;
      }
      .back:hover{
        transform: translateX(50px)
      }
      .header{
        text-align: center;
        font-size: 50px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        margin-top: 20px;
      }
      .score-wrapper{
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .player-name{
        font-size: 28px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        margin-bottom: 8px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
      }
      .score-box{
        width: 25vw;
        height: 30vh;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .score-display-blue{
        font-size: 150px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        margin: 0;
        animation: glow 1s infinite alternate;
      }
      .score-display-red{
        font-size: 150px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        margin: 0;
        animation: glow 1s infinite alternate;
      }
      .ending-display{
        position: absolute;
        pointer-events: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 50px;
        color: yellow;
        font-family: 'Courier New', Courier, monospace;
      }

      /* chat! */
      .chat-panel{
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 320px;
        height: 350px;
        background: rgba(0,0,0,0.7);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        font-family: "Courier New", Courier, monospace;
        backdrop-filter: blur(8px);
        z-index: 100;
      }
      .chat-header{
        padding: 8px 14px;
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .chat-messages{
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.2) transparent;
      }
      .chat-messages::-webkit-scrollbar{
        width: 4px;
      }
      .chat-messages::-webkit-scrollbar-thumb{
        background: rgba(255,255,255,0.2);
        border-radius: 4px;
      }
      .chat-msg{
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .chat-msg-meta{
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .chat-msg-user{
        font-size: 12px;
        font-weight: bold;
        color: rgba(255,255,255,0.75);
      }
      .chat-msg-user.blue { color: #6699ff; }
      .chat-msg-user.red  { color: #ff6666; }
      .chat-msg-time{
        font-size: 10px;
        color: rgba(255,255,255,0.3);
      }
      .chat-msg-text{
        font-size: 13px;
        color: rgba(255,255,255,0.85);
        line-height: 1.4;
        word-break: break-word;
      }
      .chat-input-row{
        display: flex;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .chat-input{
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
        padding: 10px 12px;
      }
      .chat-input::placeholder{
        color: rgba(255,255,255,0.25);
      }
      .chat-send{
        background: transparent;
        border: none;
        border-left: 1px solid rgba(255,255,255,0.1);
        color: rgba(255,255,255,0.5);
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
        padding: 10px 14px;
        cursor: pointer;
        transition: color 0.2s;
        letter-spacing: 1px;
      }
      .chat-send:hover{
        color: white;
      }

      /*sparks ig*/
      .spark {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle, white 0%, gold 40%, orange 70%, transparent 100%);
        box-shadow:
          0 0 6px gold,
          0 0 12px orange,
          0 0 20px rgba(255,165,0,0.6);
      }
      .spark-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: visible;
        z-index: 999;
      }

      @keyframes float-up {
        0% {
          opacity: 0;
          transform: translate(var(--x), var(--y)) scale(0.6);
        }
        10% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform:
            translate(
              calc(var(--x) + var(--drift)),
              calc(var(--y) - var(--rise))
            )
            scale(1.2);
        }
      }
      @keyframes victory{
        0%{
          transform: translate(-50%, -50%) scale(7);
          color: yellow;
          opacity: 1;
        }
        10%{
          transform: translate(-50%, -50%) scale(6);
          color: yellow;
          opacity: 1
        }
        30%{
          transform: translate(-50%, -50%) scale(6);
          color: yellow;
          opacity: 1
        }
        80%{
          transform: translate(-50%, -50%) scale(15);
          color: lightyellow;
          opacity: 0;
        }
        100%{
          transform: translate(-50%, -50%) scale(15);
          color: lightyellow;
          opacity: 0;
        }
      }
      @keyframes glow{
        0%{ text-shadow: 0 0 5px white; }
        100%{ text-shadow: 0 0 20px white; }
      }
      
      body{
        background-color: rgb(10,10,10);
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="spark-container"></div>
    <div id="main-content" style="opacity: 0; pointer-events: none; transition: opacity 1s ease;">
      <img src="graphics/wreath.png" style="position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 35%; height: auto;opacity: 0.5; z-index: -1;">
      <a href="../duels.html"><button class="back">Back</button></a>
      <h1 class="header">FINAL STANDINGS:</h1>
  
      <!-- Blue player -->
      <div class="score-wrapper" style="top: 5%; left: 10%;">
        <p class="player-name" id="blue-name">Player 1</p>
        <div class="score-box" style="background-color: rgb(0,0,255,0.6);">
          <p class="score-display-blue" id="blue-score">0</p>
        </div>
      </div>
  
      <!-- Red player -->
      <div class="score-wrapper" style="top: 5%; right: 10%; align-items: center;">
        <p class="player-name" id="red-name">Player 2</p>
        <div class="score-box" style="background-color: rgb(255,0,0,0.6);">
          <p class="score-display-red" id="red-score">0</p>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat-panel">
        <div class="chat-header">Match Chat</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" type="text" placeholder="Type a message..." maxlength="200">
          <button class="chat-send" id="chat-send">SEND</button>
        </div>
      </div>
    </div>

    <p class="ending-display" id="ending-display">hold up...</p>
    <script>
      function parseQueryParams(url = window.location.href) {
      	const obj = {};
      	const queryString = url.split("?")[1];
      	if (!queryString) return obj;
      
      	// Split each key=value pair
      	const pairs = queryString.split("&");
      	pairs.forEach(pair => {
      		const [key, value] = pair.split("=");
      		if (key) obj[decodeURIComponent(key)] = value ? decodeURIComponent(value) : "";
      	});
      	return obj;
      }
      var id = parseQueryParams().id;
      var other = parseQueryParams().other;
      //some sparks testing
      function createSpark(x, y) {
        const spark = document.createElement("span");
        spark.classList.add("spark");

        const rise = 80 + Math.random() * 6000;      // how high
        const drift = (Math.random() - 0.5) * 40;  // sideways wobble

        spark.style.setProperty("--x", x + "px");
        spark.style.setProperty("--y", y + "px");
        spark.style.setProperty("--rise", rise + "px");
        spark.style.setProperty("--drift", drift + "px");
        spark.style.animation = `float-up ${1.5 + Math.random() * 10}s ease-out forwards`

        document.querySelector(".spark-container").append(spark);

        spark.addEventListener("animationend", () => spark.remove());
      }
      setInterval(() => {
        createSpark(
          Math.random() * window.innerWidth,
          window.innerHeight
        );
      }, 5);
      
      const blueScore = document.getElementById("blue-score");
      const redScore  = document.getElementById("red-score");

      blueScore.textContent = "0";
      redScore.textContent  = "0";

      const endingDisplay = document.getElementById("ending-display");
      
      endingDisplay.textContent = "VICTORY";
      endingDisplay.setAttribute("style", "animation: victory 8s forwards;");

      
      const BLUE_NAME = "Player 1";
      const RED_NAME  = "Player 2";
      document.getElementById("blue-name").textContent = BLUE_NAME;
      document.getElementById("red-name").textContent  = RED_NAME;

      //chat agni do this part
      const messagesEl = document.getElementById("chat-messages");
      const inputEl    = document.getElementById("chat-input");
      const sendBtn    = document.getElementById("chat-send");

      function getTimestamp() {
        const d = new Date();
        return d.getHours().toString().padStart(2,"0") + ":"
             + d.getMinutes().toString().padStart(2,"0");
      }

      
      function appendMessage(username, text, team /* "blue" | "red" */) {
        const msg = document.createElement("div");
        msg.className = "chat-msg";
        msg.innerHTML = `
          <div class="chat-msg-meta">
            <span class="chat-msg-user ${team}">${username}</span>
            <span class="chat-msg-text">${text}</span>
            <span class="chat-msg-time">${getTimestamp()}</span>
          </div>
        `;
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      
      function handleSend() {
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = "";

        // send thing
        appendMessage(BLUE_NAME, text, "blue");
      }

      sendBtn.addEventListener("click", handleSend);
      inputEl.addEventListener("keydown", e => {
        if (e.key === "Enter") handleSend();
      });

      //for ending animation
      setTimeout(() => {
        const mc = document.getElementById("main-content");
        mc.style.opacity = "1";
        mc.style.pointerEvents = "auto";
      }, 6000);
    </script>
  </body>
</html>
