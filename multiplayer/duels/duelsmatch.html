<!DOCTYPE html>
<html>
  <head>
    <title>PERMDAS League</title>
    <script src="../../config.js"></script>
    <style>
      .header{
        text-align: center;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 2px 2px 4px black;
        font-size: 40px;
        opacity: 0;
        animation: fadeInHeader 0.5s ease 5s forwards;
      }
      .box{
        position: fixed;
        top: 0;
        left: 10%;
        width: 80%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: -1;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .answer_box{
        display: block;
        width: 40%;
        margin: 50px auto;
        height: 100px;
        font-size: 20px;
        text-align: center;
        border: 3px solid white;
        background-color: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        padding: 10px;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .equation{
        color: white;
        font-size: 60px;
        margin-top: 100px;
        text-align: center;
        font-family: "Courier New", Courier, monospace;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .aps{
        font-size: 20px;
        position: absolute;
        top: 42%;
        right: 15%;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 2px 2px 4px black;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .reading-time{
        font-size: 20px;
        position: absolute;
        top: 47%;
        right: 15%;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 2px 2px 4px black;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .typing-time{
        font-size: 20px;
        position: absolute;
        top: 52%;
        right: 15%;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 2px 2px 4px black;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .attack-bar{
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        position: absolute;
        bottom: 20%;
        left: 15%;
        width: 3%;
        height: 0px;
        max-height: 500px;
        background-color: yellow;
        border-radius: 10px;
        transition: height 0.3s ease;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .health-bar{
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        position: absolute;
        bottom: 20%;
        left: 20%;
        width: 3%;
        max-height: 500px;
        height: 500px;
        background-color: red;
        border-radius: 10px;
        transition: height 0.3s ease;
        opacity: 0;
        animation: fadeIn 0.5s ease 5s forwards;
      }
      .blue-slider{
        position: absolute;
        clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 0% 100%);
        top: 0;
        left: 0;
        width: 100%;
        height: 55%;
        background-color: #0066ff;
        opacity: 0.95;
        transform: translateY(-100%);
        animation: slideDownBlue 5s forwards;
        z-index: 100;
      }
      .red-slider{
        position: absolute;
        clip-path: polygon(0% 15%, 100% 0%, 100% 100%, 0% 100%);
        bottom: 0;
        left: 0;
        width: 100%;
        height: 55%;
        background-color: #ff0033;
        opacity: 0.95;
        transform: translateY(100%);
        animation: slideUpRed 5s forwards;
        z-index: 100;
      }
      .score-slider{
        position: absolute;
        width: 50%;
        height: 100%;
        z-index: 5;
      }
      .score-text{
        position: absolute;
        font-size: 120px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 4px 4px 8px black, -2px -2px 4px rgba(255,255,255,0.3);
        font-weight: bold;
        z-index: 2;
      }
      .versus-text{
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 120px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 4px 4px 8px black, -2px -2px 4px rgba(255,255,255,0.3);
        font-weight: bold;
        z-index: 101;
        animation: versusAppear 5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
      }
      .your-name{
        position: fixed;
        top: 5%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 120px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 4px 4px 8px black, -2px -2px 4px rgba(255,255,255,0.3);
        font-weight: bold;
        z-index: 101;
      }
      .enemy-name{
        position: fixed;
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 120px;
        font-family: "Courier New", Courier, monospace;
        color: white;
        text-shadow: 4px 4px 8px black, -2px -2px 4px rgba(255,255,255,0.3);
        font-weight: bold;
        z-index: 101;
      }
      .spark {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle, white 0%, gold 40%, orange 70%, transparent 100%);
        box-shadow:
          0 0 6px gold,
          0 0 12px orange,
          0 0 20px rgba(255,165,0,0.6);
      }
      .spark-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: visible;
        z-index: 999;
      }

      @keyframes float-up {
        0% {
          opacity: 0;
          transform: translate(var(--x), var(--y)) scale(0.6);
        }
        10% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform:
            translate(
              calc(var(--x) + var(--drift)),
              calc(var(--y) - var(--rise))
            )
            scale(1.2);
        }
      }
      @keyframes slideDownBlue{
        0% {
          transform: translateY(-100%);
        }
        30% {
          transform: translateY(0%);
        }
        70% {
          transform: translateY(0%);
        }
        100% {
          transform: translateY(-100%);
        }
      }
      @keyframes slideUpRed{
        0% {
          transform: translateY(100%);
        }
        30% {
          transform: translateY(0%);
        }
        70% {
          transform: translateY(0%);
        }
        100% {
          transform: translateY(100%);
        }
      }
      @keyframes versusAppear{
        0% {
          transform: translate(-50%, -50%) scale(0) rotate(-180deg);
          opacity: 0;
        }
        30% {
          transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
          opacity: 1;
        }
        40% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }
        70% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(0) rotate(180deg);
          opacity: 0;
        }
      }
      @keyframes fadeIn{
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes fadeInHeader{
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blue-score-slider {
          0%   { transform: translateX(-100%); }
          30%  { transform: translateX(0%); }
          70%  { transform: translateX(0%); }
          100% { transform: translateX(-100%); }
      }
      @keyframes red-score-slider {
          0%   { transform: translateX(100%); }
          30%  { transform: translateX(0%); }
          70%  { transform: translateX(0%); }
          100% { transform: translateX(100%); }
      }
      @keyframes text-glow{
        0%{ text-shadow: 0 0 5px white; }
        100%{ text-shadow: 0 0 20px white; }
      }
      body{
        background-image: url("https://media.posterstore.com/site_images/685ddd908b7ca77dcb8af940_1207156463_PS50626-4.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="spark-container"></div>
    <div class = "blue-slider">
        <p class="your-name" id = "your-name">?</p>
    </div>
    <div class = "red-slider">
        <p class="enemy-name" id = "other-name">!</p>
    </div>
    <div class = "versus-text">VS</div>
    <div class = "box"></div>
    <h1 class = "header">PERMDAS LEAGUE FT 5</h1>
    <p class = "equation" id = "equation">Loading...</p>
    <p class = "reading-time" id = "reading-time">Avg Read: 0.00s</p>
    <p class = "typing-time" id = "typing-time">Avg Type: 0.00s</p>
    <p class = "aps" id = "aps">APS: __.__</p>
    <textarea class = "answer_box" id = "answer_box"></textarea>
    <div class = "attack-bar" id = "attack-bar"></div>
    <div class = "health-bar" id = "health-bar"></div>
    <script>
      function convertHttpToWs(url) {
      	try {
      		const parsed = new URL(url);
      		if (parsed.protocol === "https:") parsed.protocol = "wss:";
      		else if (parsed.protocol === "http:") parsed.protocol = "ws:";
      		return parsed.toString();
      	} catch (e) {
      		console.error("Invalid URL:", url);
      		return null;
      	}
      }

      function parseQueryParams(url = window.location.href) {
      	const obj = {};
      	const queryString = url.split("?")[1];
      	if (!queryString) return obj;
      
      	// Split each key=value pair
      	const pairs = queryString.split("&");
      	pairs.forEach(pair => {
      		const [key, value] = pair.split("=");
      		if (key) obj[decodeURIComponent(key)] = value ? decodeURIComponent(value) : "";
      	});
      	return obj;
      }
      var id = parseQueryParams().id;
      var other = parseQueryParams().other;


      //sparks!
      function createSpark(x, y) {
        const spark = document.createElement("span");
        spark.classList.add("spark");

        const rise = 80 + Math.random() * 6000;      // how high
        const drift = (Math.random() - 0.5) * 40;  // sideways wobble

        spark.style.setProperty("--x", x + "px");
        spark.style.setProperty("--y", y + "px");
        spark.style.setProperty("--rise", rise + "px");
        spark.style.setProperty("--drift", drift + "px");
        spark.style.animation = `float-up ${1.5 + Math.random() * 10}s ease-out forwards`

        document.querySelector(".spark-container").append(spark);

        spark.addEventListener("animationend", () => spark.remove());
      }
      const sparkInterval = setInterval(() => {
        createSpark(
          Math.random() * window.innerWidth,
          window.innerHeight
        );
      }, 1);
      //stops sparks from spawning during match
      setTimeout(() => {
        clearInterval(sparkInterval);
      }, 2000);
      
      document.getElementById("your-name").innerHTML = localStorage.username;
      document.getElementById("other-name").innerHTML = other;
      
      const wsAPI = convertHttpToWs(API)
      const ws = new WebSocket(wsAPI);
      
      let equation = [];
      let currentBag = [];
      let currentEquationsInBag = [];
      let operations = ["+", "-", "*", "/"];
      let currentOperator = operations[Math.floor(Math.random() * 4)];
      let equationNum = 0;
      let attacksQued = [];
      let combo = 0;
      let comboMultiplier = 1;
      let health = 40;
      let paused = true;
      let attackDelay = 3000; // 5 seconds in milliseconds
      
      // Stats tracking variables
      let equationsCompleted = 0;
      let startTime = Date.now();
      let timerInterval;
      let timerStarted = false;
      let problemPhase = "not started";
      let phaseStartTime = Date.now();
      let totalReadingTime = 0;
      let totalTypingTime = 0;

      //your score
      let selfScore = 0;
      //enemy score
      let enemyScore = 0;
      //very important thing
      let gameEnded = false;

      const equationElement = document.getElementById("equation");
      const answerBox = document.getElementById("answer_box");
      const apsElement = document.getElementById("aps");
      const readingTimeElement = document.getElementById("reading-time");
      const typingTimeElement = document.getElementById("typing-time");
      const attackBarElement = document.getElementById("attack-bar");
      const healthBarElement = document.getElementById("health-bar");

      //some controls from localStorage
      let answerQuestion = localStorage.getItem("answer_question");

      //lol why is this here
      let resetGame = localStorage.getItem("reset_game");
      
      ws.onopen = () => {
      	console.log("WS connected");
        ws.send(JSON.stringify({
          connectMsg: true,
          id: id,
          name: localStorage.username
        }))
      };

      //score slider trigger
      function triggerScoreSlider() {
        //make answer box acessible again
        answerBox.disabled = false;

        //remove old score sliders
        const oldScoreSliders = document.querySelectorAll(".score-slider");
        oldScoreSliders.forEach(slider => slider.remove());

        //slidersss
        const scoreSlider = document.createElement("div");
        scoreSlider.className = "score-slider";
        scoreSlider.style.backgroundColor = "blue";
        scoreSlider.style.left = "0";
        scoreSlider.style.top = "0%";
        scoreSlider.style.animation = "blue-score-slider 5s forwards";

        const scoreSlider2 = document.createElement("div");
        scoreSlider2.className = "score-slider";
        scoreSlider2.style.backgroundColor = "red";
        scoreSlider2.style.left = "50%";
        scoreSlider2.style.top = "0%";
        scoreSlider2.style.animation = "red-score-slider 5s forwards";
        
        //text stuff
        const scoreTextBlue = document.createElement("p");
        scoreTextBlue.className = "score-text";
        scoreTextBlue.textContent = selfScore;
        scoreTextBlue.style.animation = "text-glow 1s infinite alternate";
        scoreTextBlue.style.left = "50%";
        scoreTextBlue.style.top = "40%";
        scoreTextBlue.style.transform = "translate(-50%, -50%)";
        scoreSlider.appendChild(scoreTextBlue);

        const scoreTextRed = document.createElement("p");
        scoreTextRed.className = "score-text";
        scoreTextRed.textContent = enemyScore;
        scoreTextRed.style.animation = "text-glow 1s infinite alternate";
        scoreTextRed.style.left = "50%";
        scoreTextRed.style.top = "40%";
        scoreTextRed.style.transform = "translate(-50%, -50%)";
        scoreSlider2.appendChild(scoreTextRed);
        
        //appending to doc
        document.body.appendChild(scoreSlider2);
        document.body.appendChild(scoreSlider);
      }
      triggerScoreSlider();

      function sendAttack(damage){
        //send this to enemy

        //server is hub, tell it the destination and its contents
        ws.send(JSON.stringify({
          connectMsg:false,
          damagePacket: [damage, Date.now()],
          id: id,
          name: localStorage.username
        })) // did not use ai for dis btw
        console.log("sent server ", {damagePacket: [damage, Date.now()],
          id: id})
        //attacksQued.push([damage, Date.now()]); // [damage, timestamp]
        //updateAttackBar();
        //console.log("Attack queued:", damage, "Total attacks:", attacksQued.length);
      }
      ws.onmessage = (e) => {
        
      	const data = JSON.parse(e.data);
      	console.log("WS message:", e.data);
        
        if (data.type === "countdown") {
            paused = true;
            if (data.value === 0) {
                equationElement.innerHTML = "GO!";
                phaseStartTime = Date.now();
            } else if (data.value === "start") {
              paused = false;
              phaseStartTime = Date.now();
              
              equationElement.textContent = displayEquation();
            } else {
                equationElement.innerHTML = data.value;
            }
            return;
        }
        if(data.victory) victory();
        else{
      	  attacksQued.push(data); // [damage, timestamp]
          updateAttackBar();
          console.log("Attack queued:", data[0], "Total attacks:", data.attacksQued?.length);
        }
      };
      
      ws.onclose = () => {
      	console.log("WS closed");
      };
      
      ws.onerror = (err) => {
      	console.log("WS error:", err);
      };

      // Stats functions
      function updateAPS() {
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 0) {
          const aps = equationsCompleted / elapsed;
          apsElement.textContent = `APS: ${aps.toFixed(2)}`;
        }

        // Update average reading and typing times
        if (equationsCompleted > 0) {
          const avgReading = (totalReadingTime / equationsCompleted / 1000).toFixed(2);
          const avgTyping = (totalTypingTime / equationsCompleted / 1000).toFixed(2);
          readingTimeElement.textContent = `Avg Read: ${avgReading}s`;
          typingTimeElement.textContent = `Avg Type: ${avgTyping}s`;
        }
      }
      
      function switchPhase(newPhase) {
        // Record time spent in current phase
        const phaseElapsed = Date.now() - phaseStartTime;

        if (problemPhase === "reading") {
          totalReadingTime += phaseElapsed;
        } else if (problemPhase === "typing") {
          totalTypingTime += phaseElapsed;
        }

        // Switch to new phase
        problemPhase = newPhase;
        phaseStartTime = Date.now();
      }
      
      function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        startTime = Date.now();
        phaseStartTime = startTime;
        switchPhase("reading");
        timerInterval = setInterval(() => {
          const elapsed = (Date.now() - startTime) / 1000;
          updateAPS();
        }, 50); // updates 20 times per second
      }
      
      function generateBag(){
        currentBag = [];
        currentEquationsInBag = [];
        for(let i = 0; i < 8; i++){
          //generating the operators
          currentOperator = operations[Math.floor(Math.random() * 4)];
          currentBag.push(currentOperator);
          //generating the numbers
          if(currentOperator!== "/"&&currentOperator!== "*"){
            currentEquationsInBag.push([Math.floor(Math.random() * 10), Math.floor(Math.random() * 10)]);
          }else{
            let num1 = Math.floor(Math.random() * 12);
            let num2 = Math.floor(Math.random() * 12);
            if(currentOperator==="/"){
              if(num1 === 0){num1 = 1;}
              if(num2 === 0){num2 = 1;}
            }
            currentEquationsInBag.push([num1, num2]);
          }
        }
      }
      
      function displayOperater(){
        switch(currentBag[equationNum]){
          case "+":
            return "+";
          break;
          case "-":
            return "-";
          break;
          case "*":
            return "×";
          break;
          case "/":
            return "÷";
          break;
          
        }
      }
      
      function displayEquation(){
        switch(currentBag[equationNum]){
            case "+":
              return currentEquationsInBag[equationNum][0] +" "+ displayOperater() +" "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "-":
              return currentEquationsInBag[equationNum][0] +" "+ displayOperater() +" "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "*":
              return currentEquationsInBag[equationNum][0] +" "+ displayOperater() +" "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "/":
              return currentEquationsInBag[equationNum][0]*currentEquationsInBag[equationNum][1] +" "+ displayOperater() +" "+ currentEquationsInBag[equationNum][1]+" = ";
        }
      }

      function findComboMultiplier(){
        comboMultiplier = combo/30+1;
      }
      
      function findAttack(){
        findComboMultiplier();
        if(equationNum<8){
          switch(currentBag[equationNum]){
              case "+":
                return 1*comboMultiplier;
              break;
              case "-":
                return 2*comboMultiplier;
              break;
              case "*":
                return 4*comboMultiplier;
              break;
              case "/":
                return 4*comboMultiplier;
              break;
              default:
                console.log("error");
                console.log(currentBag[equationNum]);
                console.log(currentEquationsInBag[equationNum]);
                console.log(equationNum);
                return 0;
          }
        }else{
          switch(currentBag[equationNum-1]){
              case "+":
                return 1*comboMultiplier;
              break;
              case "-":
                return 2*comboMultiplier;
              break;
              case "*":
                return 4*comboMultiplier;
              break;
              case "/":
                return 4*comboMultiplier;
              break;
              default:
                console.log("error");
                console.log(currentBag[equationNum]);
                console.log(currentEquationsInBag[equationNum]);
                console.log(equationNum);
                return 0;
          }
        }
      }
      
      function findAnswer(){
        switch(currentBag[equationNum]){
            case "+":
              return currentEquationsInBag[equationNum][0] + currentEquationsInBag[equationNum][1];
            break;
            case "-":
              return currentEquationsInBag[equationNum][0] - currentEquationsInBag[equationNum][1];
            break;
            case "*":
              return currentEquationsInBag[equationNum][0] * currentEquationsInBag[equationNum][1];
            break;
            case "/":
              return currentEquationsInBag[equationNum][0];
            break;
        }
      }

      function attackTick(){
        const currentTime = Date.now();
        
        for(let i = attacksQued.length - 1; i >= 0; i--){
          let attack = attacksQued[i];
          let timeSinceQueued = currentTime - attack[1]; // attack[1] is timestamp
          
          // If attack has been queued for 5+ seconds, apply damage
          if(timeSinceQueued >= attackDelay){
            health -= attack[0]; // attack[0] is damage
            attacksQued.splice(i, 1); // Remove this attack
            updateAttackBar();
            updateHealthBar();
            // console.log("Attack hit! Health:", health, "Remaining attacks:", attacksQued.length);
            
            // Check for game over
            if(health <= 0){
              handleGameOver();
            }
          }
        }
      }
      
      function updateAttackBar() {
        // Calculate total queued attack damage
        let totalAttack = 0;
        for(let attack of attacksQued) {
          totalAttack += attack[0]; // attack[0] is the damage value
        }
        
        // Update bar height (max 500px)
        const barHeight = Math.min(totalAttack * 50, 500); // Scale as needed
        attackBarElement.style.height = barHeight + 'px';
      }
      
      function updateHealthBar() {
        // Update health bar height based on current health (0-100)
        const healthPercentage = Math.max(0, health) / 40;
        const barHeight = healthPercentage * 500;
        healthBarElement.style.height = barHeight + 'px';
      }
      function handleGameOver(){
        health = 40;
        attacksQued.length = 0;
        updateHealthBar();
        endGame();
      }
      function endGame() {
        if(gameEnded){return;}
        gameEnded = true;
        enemyScore++;
        if(enemyScore>=5){
          ws.send(JSON.stringify({
            connectMsg:false,
            victory: true,
            id: id,
            name: localStorage.username
          })); // did not use ai for dis btw
          window.location.replace('https://cunfuzed.github.io/PERMDAS/multiplayer/duels/duelsend?id='+id+'&other='+other+"&win=false"); //you suck, how could you lose!!!
        }else{
          ws.send(JSON.stringify({
            connectMsg:false,
            victory: true,
            gameOver: true,
            id: id,
            name: localStorage.username
          }));
        }
        clearInterval(timerInterval);
        clearInterval(attackInterval);
        paused = true;
        answerBox.disabled = true;
        triggerScoreSlider();
      }
      function victory() {
        if(gameEnded){return;}
        gameEnded = true;
        selfScore++;
        if(selfScore>=5){
          ws.send(JSON.stringify({
            connectMsg:false,
            victory: true,
            id: id,
            name: localStorage.username
          }));
          window.location.replace('https://cunfuzed.github.io/PERMDAS/multiplayer/duels/duelsend?id='+id+'&other='+other+"&win=true");//you also suck, how did it take you so long?
        }
        clearInterval(timerInterval);
        clearInterval(attackInterval);
        paused = true;
        answerBox.disabled = true;
        triggerScoreSlider();
      }
      

      generateBag();
      
      // Start attack tick interval
      const attackInterval = setInterval(attackTick, 100); // Check every 100ms
      
       //loop
      setInterval(() => {
          // ONLY display the equation if the game is NOT paused
          // This allows the countdown text to stay on screen
          if (!paused) {
              equationElement.textContent = displayEquation();
          }
      }, 100);
      
      //solving equation
      answerBox.addEventListener("keyup", (event) =>{
        if(paused) return;
        
        // Switch to typing phase when user starts typing
        if (problemPhase === "reading") {
          switchPhase("typing");
        }

        if (!timerStarted){
          startTimer();
        }
        
        if(event.key === answerQuestion){
          if(Number(answerBox.value) === findAnswer()){
            equationNum++;
            combo++;
            equationsCompleted++;
            switchPhase("reading");

            if(equationNum>7){
              equationNum = 0;
              generateBag();
            }
            
            let attackValue = findAttack();
            
            if(attacksQued.length > 0){
              // Reduce first attack in queue by damage dealt
              attacksQued[0][0] -= attackValue;
              if(attacksQued[0][0] <= 0){
                attacksQued.shift();
              }
              updateAttackBar();
            } else {
              // No attacks to defend against, send attack to enemy
              sendAttack(attackValue);
            }
            
            answerBox.value = "";
            displayEquation();
          }else{
            answerBox.value = "";
            paused = true;
            equationElement.innerHTML = "Wrong answer<br>2 second penalty";
            answerBox.disabled = true;
            combo = 0;
            setTimeout(() =>{
              paused = false;
              answerBox.disabled = false;
              displayEquation();
              answerBox.focus();
              switchPhase("reading");
            }, 2000);
          }
        }
      });
    </script>
  </body>
</html>
