<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHMS 2026 Leaderboard</title>
    <style>
      /*styling stuff*/
        .header{
            color: rgb(255, 255, 255);
            text-shadow: 2px 2px 4px black;
            text-align: center;
            font-size: 50px;
            font-family: "Courier New", Courier, monospace;
        }
          .text{
              color: rgb(255, 255, 255);
              text-shadow: 2px 2px 4px black;
              text-align: center;
              font-size: 30px;
              font-family: "Courier New", Courier, monospace;
          }

          body{
            background-image: url("images/billy-pasco-mpMaD_BzP8I-unsplash.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
          }

          #bracket {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            overflow-x: auto;
            padding: 60px;

          }

          .round {
            display: flex;
            flex-direction: column;
            gap: 30px;
            color:rgb(255, 255, 255);
            text-shadow: black 2px 2px 4px;
            font-family: "Courier New", monospace;
            text-align: center;
            size: 40px;

          }

          .match {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 8px;
            color: rgb(213, 245, 255);
            font-family: "Courier New", monospace;
            text-align: center;
          }

          .back{
          backdrop-filter: blur(10px);
          padding: 15px 50px 15px 80px;
          clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%);
          position: absolute;
          color: red;
          background-color:rgba(0, 0, 0, 0.3);
          top: 0px;
          left: -50px;
          font-size: 30px;
          border: none; 
          cursor: pointer;
          font-family: "Courier New", Courier, monospace;
          transition: all 0.3s ease;
        }
        .back:hover{
          transform: translateX(50px)
        }


    </style>
</head>
<body>

    <h1>/</h1>
    <h1 class = "header" id = "header">BHMS 2026 Leaderboard</h1>
      <a href = "bhms.html"><button class = "back">Back</button></a>

    <div id = bracket></div>
    <script>

      /*function to check for even numbers*/
      function isEven(number) {
        return number % 2 === 0;
      }
      /*Function to get matches, nestesd array*/
      function getMatches(players){
        let matches = [];
        for(let i = 0; i < players.length; i+=2){
          if(players[i] != ";" && players[i+1] != ";"){
            matches.push([players[i], players[i+1]]);
          }
        }
        return matches;
      }

      /*setting up lists

        list structure is in nested loops, and each new array added is the nextr round
        The first array is the first round and so forth until it ends.
        If we have an odd number of players, we have a pass, meaning the person with the fastest es will go on to the next without a match
        We must put the player with the pass AT THE END of the array so it shows properly!!

      */
      playersList = [
        ["Player1", "Player2", "Player3", "Player4", "Player5", "Player6", "Player7", "Player8", "Player9"], 
        ["Player1", "Player3", "Player5", "Player7", "Player9"], 
        ["Player1", "Player5", "Player9"], 
        ["Player1", "Player9"], 
        ["Player1"]
      ];
      /* Finds the number of rounds so far*/
      let rounds = 0;
      for (let i = 0; i < playersList.length; i++){
        for (let j =0; j < playersList[i].length; j++){
          if(playersList[i][j+1] == undefined){
            rounds++;
          }
        }
      }

      /* setting up var and lists*/

      let a = 0

      let winner = "";

      const matches = getMatches(playersList);
      const bracket = document.getElementById("bracket");
      const round = document.createElement("div");
      /*debugging stuff*/
      console.log(matches);
      console.log(rounds);

      for (let k = 0 ; k < rounds; k++){

        /*creates and adds new rounds*/
        const round = document.createElement("div");
        round.textContent = "Round " + (k+1);
        round.classList.add("round");
        let i = 0;
        /* bassically checks for a pass/victory, and adds it. If not, adds the mathc*/
        while (playersList[k][i] != undefined && i < playersList[k].length){
          const match = document.createElement("div");
          match.classList.add("match");
          if (playersList[k][i+1] == undefined){
            if(playersList[k][i-1] == undefined){
              match.textContent = playersList[k][i] + " has won!";
              winner = playersList[k][i];
            } else {
              match.textContent = playersList[k][i] + " has a pass!";
            }
          } else {
            match.textContent = playersList[k][i] + " vs " + playersList[k][i+1];
          }
          round.appendChild(match);
          i+=2;
        }
        bracket.appendChild(round);
      }

    </script>
</body>
</html>
