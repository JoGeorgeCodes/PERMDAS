<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>PERMDAS</title>
    <link href="style.css" rel="stylesheet" type="text/css" />

    <style>
      .header{
        color: black;
        text-shadow: 2px 2px 4px black;
        text-align: center;
        font-size: 50px;
        font-family: "Courier New", Courier, monospace;
      }
      .text{
        text-align: center;
        font-size: 15px;
        color: gray;
        font-family: "Courier New", Courier, monospace;
      }
      .scene-button{
        text-align: left;
        font-family: "Courier New", Courier, monospace;
        clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%);
        display: block;
        margin: 10px 5%;
        transform: translateX(250px);
        padding: 30px 100% 30px 500px; /* top, right, bottom, left */
        font-size: 30px;
        color: white;
        border: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }
      .scene-button:hover{
        transform: translateX(100px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      }
      .scene-button:active{
        transform: translateY(0);
      }
      .multiplayer{
        background: red;
      }
      .modes{
        background: orange;
      }
      .customization{
        background: blue;
      }
      .stats{
        background: lightseagreen;
      }
      .credits{
        background: gray;
      }
      .bhms{
        background: purple;
      }
      body {
        background-image: url("images/billy-pasco-mpMaD_BzP8I-unsplash.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        overflow-x: hidden; /* so that the buttons doesn't create a horizontal scrollbar because the buttons are so large. I'm not sure how to adjust the button size to stop at the edge of the viewport, someone else can figure that out */
      }

    </style>
  </head>

  <body>
    <h1 class = "header" id = "header">PERMDAS</h1>
    <p class = "text">paranthesis exponent/root multiplication/division addition/subtraction</p>
    <a href="multiplayer.html"><button class="multiplayer scene-button">Multiplayer (INDEV)</button></a>
    <a href="modes.html"><button class="modes scene-button">Single Player Modes</button></a>
    <a href="bhms.html"><button class="bhms scene-button">BHMS Competition 2026</button></a>
    <a href="customization.html"><button class="customization scene-button">Customization</button></a>
    <a href="stats.html"><button class="stats scene-button">Stats</button></a>
    <a href="credits.html"><button class="credits scene-button">Credits</button></a>
    <audio id = "intro" autoplay></audio>
    <audio id = "loop" autoplay loop></audio>
    
    <script>
      //background music!
      const backgroundIntroMusic = document.getElementById("intro");
      const backgroundMusic = document.getElementById("loop");
      const musicEnabled = localStorage.getItem("musicEnabled");
      if(musicEnabled === "true"){
        backgroundIntroMusic.src = "music/nostalgia_intro.mp3";
      }
      // Load saved background if it exists
      window.addEventListener('load', () => {
        const savedBg = localStorage.getItem('customBackground');
        if (savedBg) {
          document.body.style.backgroundImage = `url('${savedBg}')`;
        }
      });
      backgroundIntroMusic.addEventListener("ended",() => {
        backgroundMusic.src = "music/nostalgia_loop.mp3";
        backgroundMusic.play();
        backgroundMusic.loop = true;
      });
    </script>
  </body>

</html>
