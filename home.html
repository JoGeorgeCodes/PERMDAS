<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>PERMDAS</title>
    <link href="style.css" rel="stylesheet" type="text/css" />

    <style>
      .header{
        color: black;
        text-shadow: 2px 2px 4px black;
        text-align: center;
        font-size: 50px;
        font-family: "Courier New", Courier, monospace;
      }
      .text{
        text-align: center;
        font-size: 15px;
        color: gray;
        font-family: "Courier New", Courier, monospace;
      }
      #scene-button{
        text-align: left;
        font-family: "Courier New", Courier, monospace;
        clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%);
        display: block;
        margin: 10px 5%;
        transform: translateX(250px);
        padding: 30px 100% 30px 500px; /* top, right, bottom, left */
        font-size: 30px;
        color: white;
        border: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }
      #scene-button:hover{
        transform: translateX(100px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      }
      #scene-button:active{
        transform: translateY(0);
      }
      .multiplayer{
        background: red;
      }
      .modes{
        background: orange;
      }
      .customization{
        background: blue;
      }
      .stats{
        background: lightseagreen;
      }
      .credits{
        background: gray;
      }
      body {
        background-image: url("https://images.unsplash.com/photo-1509149037-37dc57ccbd13?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2xpZmYlMjBlZGdlfGVufDB8fDB8fHww");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

    </style>
  </head>

  <body>
    <h1 class = "header" id = "header">PERMDAS</h1>
    <p class = "text">paranthesis exponent/root multiplication/division addition/subtraction</p>
    <button class="multiplayer" id = "scene-button" onclick="window.location.href='multiplayer.html'">Multiplayer (INDEV)</button>
    <button class="modes" id = "scene-button" onclick="window.location.href='modes.html'">Single Player Modes</button>
    <button class="customization" id = "scene-button" onclick="window.location.href='customization.html'">Customization</button>
    <button class="stats" id = "scene-button" onclick="window.location.href='stats.html'">Stats</button>
    <button class="credits" id = "scene-button" onclick="window.location.href='credits.html'">Credits</button>
    <audio id = "intro" autoplay></audio>
    <audio id = "loop" autoplay loop></audio>
    
    <script>
      //background music!
      const backgroundIntroMusic = document.getElementById("intro");
      const backgroundMusic = document.getElementById("loop");
      const musicEnabled = localStorage.getItem("musicEnabled");
      if(musicEnabled === "true"){
        backgroundIntroMusic.src = "music/nostalgia_intro.mp3";
      }
      // Load saved background if it exists
      window.addEventListener('load', () => {
        const savedBg = localStorage.getItem('customBackground');
        if (savedBg) {
          document.body.style.backgroundImage = `url('${savedBg}')`;
        }
      });
      backgroundIntroMusic.addEventListener("ended",() => {
        backgroundMusic.src = "music/nostalgia_loop.mp3";
        backgroundMusic.play();
        backgroundMusic.loop = true;
      });
    </script>
  </body>

</html>
