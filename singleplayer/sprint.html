    <style>

      .record{
        position: absolute;

      /* ?puedes contar? */

      /* nigh */
      .results-overlay {
        position: fixed;

  <body>
    <a href = "../modes.html"><button class = "back">Modes</button></a>
    <div class = "menu-screen-info" id = "menu-screen"><div style = "font-size: 40px; align-items: center;">40 Equation Sprint:<div><div style = "font-size: 20px;">Solve 40 equations as fast as you can!</div></div>
    <div class = "menu-screen-start" id = "menu-screen-start">Click to start:<button class = "start-button">START</button></div>
    <div class = "menu-screen-options" id = "menu-screen-options"><div style = "font-size: 30px;">Info:</div>-You may not submit to leaderboards without a password<br>-You can create a password in customization<br>-if you do not have a password, your password is blank</div>

    <script>
      let gameStarted = false;
      function startGame(){
        gameStarted = true;

        const menu_screen_info = document.getElementById("menu-screen");
        menu_screen_info.style.animation = "fadeOut 1s ease forwards";
        const menu_screen_start = document.getElementById("menu-screen-start");
        menu_screen_start.style.animation = "fadeOut 1s ease forwards";
        const menu_screen_options = document.getElementById("menu-screen-options");
        menu_screen_options.style.animation = "fadeOut 1s ease forwards";

        menu_screen_info.addEventListener("animationend",()=>{ menu_screen_info.remove(); });
        menu_screen_start.addEventListener("animationend",()=>{ menu_screen_start.remove(); });
        menu_screen_options.addEventListener("animationend",()=>{ menu_screen_options.remove(); });

        const back_box = document.createElement("div");
        back_box.className = "box";
        document.body.appendChild(back_box);

        const title = document.createElement("h1");
        title.className = "header";
        title.textContent = "40 Equation Sprint";
        document.body.appendChild(title);

        const equationElement = document.createElement("p");
        equationElement.textContent = "Loading...";
        equationElement.className = "equation";
        equationElement.id = "equation";
        document.body.appendChild(equationElement);

        const highscore = document.createElement("p");
        highscore.className = "highscore";
        highscore.id = "highscore";
        highscore.innerHTML = "Best Time: --";
        document.body.appendChild(highscore);

        const timer = document.createElement("p");
        timer.className = "timer";
        timer.id = "timer";
        timer.innerHTML = "Time: 0.00s";
        document.body.appendChild(timer);

        const statBox = document.createElement("div");
        statBox.className = "stat-box";
        document.body.appendChild(statBox);

        const readingTime = document.createElement("p");
        readingTime.id = "reading-time";
        readingTime.innerHTML = "Avg Read: 0.00s";
        statBox.appendChild(readingTime);

        const typingTime = document.createElement("p");
        typingTime.id = "typing-time";
        typingTime.innerHTML = "Avg Type: 0.00s";
        statBox.appendChild(typingTime);

        const aps = document.createElement("p");
        aps.id = "aps";
        aps.innerHTML = "APS: __.__";
        statBox.appendChild(aps);

        const counter = document.createElement("p");
        counter.id = "counter";
        counter.innerHTML = "Equations Left: 40";
        statBox.appendChild(counter);

        const answerBox = document.createElement("textarea");
        answerBox.className = "answer_box";
        answerBox.id = "answer_box";
        document.body.appendChild(answerBox);
        answerBox.focus();
      }

      if(localStorage.passwordHash == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"){}

      function submitFinalScore(finalTime) {
        const username = localStorage.getItem("username");
        if (!username) { console.error("No username found in localStorage"); return; }
        fetch(API + "/score", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: username, score: finalTime, passwordHash: localStorage.passwordHash })
        })
        .then(res => res.json())
        .then(data => { console.log("Score submitted:", data.user); })
        .catch(err => { console.error("Score submit failed:", err); alert("Score Submit failed: "+err); });
      }

      let bestTime = localStorage.getItem("bestTime");
      if (bestTime !== null) { bestTime = Number(bestTime); }

      let sum = Math.floor(Math.random() * 10);
      let firstNum = Math.floor(Math.random() * sum);
      let secondNum = sum-firstNum;
      let equationsLeft = 40;
      let equationsCompleted = 0;
      let startTime = Date.now();
      let timerInterval;
      let timerStarted = false;
      let problemPhase = "not started";
      let phaseStartTime = Date.now();
      let totalReadingTime = 0;
      let totalTypingTime = 0;
      let mistakes = 0;
      let keypresses = 0;
      let recordType = false;
      let inputListenerAttached = false;

      let answerQuestion = localStorage.getItem("answer_question");
      let resetGame = localStorage.getItem("reset_game");
      let totalGames = localStorage.getItem("totalGames");
      let totalEquations = localStorage.getItem("totalEquations");

      function updateAPS() {
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 0) { apsElement.textContent = `APS: ${(equationsCompleted / elapsed).toFixed(2)}`; }
        if (equationsCompleted > 0) {
          readingTimeElement.textContent = `Avg Read: ${(totalReadingTime / equationsCompleted / 1000).toFixed(2)}s`;
          typingTimeElement.textContent  = `Avg Type: ${(totalTypingTime  / equationsCompleted / 1000).toFixed(2)}s`;
        }
      }

      let currentBag = [];
      let currentEquationsInBag = [];
      let operations = ["+", "-", "*", "/"];
      let currentOperator = operations[Math.floor(Math.random() * 4)];
      let equationNum = 0;

      function displayEquation(){
        switch(currentBag[equationNum]){
          case "+": return currentEquationsInBag[equationNum][0] +" + "+ currentEquationsInBag[equationNum][1]+" = ";
          case "-": return currentEquationsInBag[equationNum][0] +" - "+ currentEquationsInBag[equationNum][1]+" = ";
          case "*": return currentEquationsInBag[equationNum][0] +" × "+ currentEquationsInBag[equationNum][1]+" = ";
          case "/": return currentEquationsInBag[equationNum][0]*currentEquationsInBag[equationNum][1] +" ÷ "+ currentEquationsInBag[equationNum][1]+" = ";
        }
      }
      function equationGenerate(){
        currentBag = []; currentEquationsInBag = [];
        for(let i = 0; i < 8; i++){
          currentOperator = operations[Math.floor(Math.random() * 4)];
          currentBag.push(currentOperator);
          if(currentOperator!=="/"&&currentOperator!=="*"){
            currentEquationsInBag.push([Math.floor(Math.random()*10), Math.floor(Math.random()*10)]);
            if(currentOperator==="-"&&currentEquationsInBag[i][0]<currentEquationsInBag[i][1]){
              let t=currentEquationsInBag[i][0]; currentEquationsInBag[i][0]=currentEquationsInBag[i][1]; currentEquationsInBag[i][1]=t;
            }
          }else{
            let n1=Math.floor(Math.random()*12), n2=Math.floor(Math.random()*12);
            if(currentOperator==="/"){if(n1===0)n1=1;if(n2===0)n2=1;}
            currentEquationsInBag.push([n1,n2]);
          }
        }
      }
      function findAnswer(){
        switch(currentBag[equationNum]){
          case "+": return currentEquationsInBag[equationNum][0]+currentEquationsInBag[equationNum][1];
          case "-": return currentEquationsInBag[equationNum][0]-currentEquationsInBag[equationNum][1];
          case "*": return currentEquationsInBag[equationNum][0]*currentEquationsInBag[equationNum][1];
          case "/": return currentEquationsInBag[equationNum][0];
        }
      }
      function switchPhase(newPhase) {
        const e = Date.now() - phaseStartTime;
        if(problemPhase==="reading") totalReadingTime+=e;
        else if(problemPhase==="typing") totalTypingTime+=e;
        problemPhase=newPhase; phaseStartTime=Date.now();
      }
      function startTimer() {
        if(timerStarted) return;
        timerStarted=true; startTime=Date.now(); phaseStartTime=startTime;
        switchPhase("reading");
        timerInterval=setInterval(()=>{
          timerElement.textContent=`Time: ${((Date.now()-startTime)/1000).toFixed(2)}s`;
          updateAPS();
        },50);
      }
      function updateHighscoreDisplay() {
        if(bestTime!==null) highScoreElement.textContent=`Best Time: ${bestTime.toFixed(2)}s`;
      }
      function unlockAchievement(id) {
        let a=JSON.parse(localStorage.getItem('unlockedAchievements')||'[]');
        if(!a.includes(id)){a.push(id);localStorage.setItem('unlockedAchievements',JSON.stringify(a));}
      }
      function record(text){
        const r=document.createElement("p"); r.className="record"; r.textContent=text; document.body.appendChild(r);
        const s=document.createElement("p"); s.className="second-record"; s.textContent=text; document.body.appendChild(s);
      }

      /* puedo contar */
      function runCountdown(callback) {
        const overlay=document.createElement("div"); overlay.className="countdown-overlay"; document.body.appendChild(overlay);
        const steps=["Ready...","Get set...","GO"]; let i=0;
        function showNext(){
          while(overlay.firstChild) overlay.removeChild(overlay.firstChild);
          if(i>=steps.length){overlay.remove();callback();return;}
          const n=document.createElement("span");
          n.className="countdown-number"+(steps[i]==="GO"?" countdown-go":"");
          n.textContent=steps[i]; overlay.appendChild(n); i++;
          setTimeout(showNext,900);
        }
        showNext();
      }

      /* also nigh, but more nigh */
      function showResultsScreen(finalTime, avgReadingTime, avgTypingTime, isPersonalBest) {
        const apsVal    = (40 / finalTime).toFixed(2);
        const accuracyVal = mistakes === 0 ? "100%" : `${(40/(40+mistakes)*100).toFixed(1)}%`;
        const pbText    = bestTime !== null ? bestTime.toFixed(2)+"s" : "--";
        const noMistake = mistakes === 0;

        const overlay = document.createElement("div");
        overlay.className = "results-overlay";

        const card = document.createElement("div");
        card.className = "results-card";

        card.innerHTML = `
          <p class="results-title">Sprint Complete</p>
          <p class="results-subtitle">40 Equations</p>

          <div style="display:flex;flex-direction:column;align-items:center;">
            <div>
              <span class="results-time">${finalTime.toFixed(2)}</span><span class="results-time-unit">s</span>
            </div>
            <div class="results-time-label">Final Time</div>
          </div>

          ${isPersonalBest
            ? '<div class="results-pb-badge"> Personal Best! </div>'
            : '<div style="height:16px"></div>'}

          <div class="results-divider"></div>

          <div class="results-stats">
            <div class="results-stat-item">
              <span class="results-stat-label">Avg Read</span>
              <span class="results-stat-value accent">${avgReadingTime}s</span>
            </div>
            <div class="results-stat-item">
              <span class="results-stat-label">Avg Type</span>
              <span class="results-stat-value accent">${avgTypingTime}s</span>
            </div>
            <div class="results-stat-item">
              <span class="results-stat-label">APS</span>
              <span class="results-stat-value accent">${apsVal}</span>
            </div>
            <div class="results-stat-item">
              <span class="results-stat-label">Accuracy</span>
              <span class="results-stat-value ${noMistake ? 'good' : ''}">${accuracyVal}</span>
            </div>
            <div class="results-stat-item">
              <span class="results-stat-label">Mistakes</span>
              <span class="results-stat-value ${noMistake ? 'good' : ''}">${mistakes}</span>
            </div>
            <div class="results-stat-item">
              <span class="results-stat-label">Best Time</span>
              <span class="results-stat-value">${pbText}</span>
            </div>
          </div>

          <div class="results-divider"></div>

          <div class="results-buttons">
            <button class="results-btn results-btn-primary"   id="results-play-again">Play Again</button>
            <button class="results-btn results-btn-secondary" id="results-menu">Modes</button>
          </div>
        `;

        overlay.appendChild(card);
        document.body.appendChild(overlay);
        document.getElementById("results-play-again").addEventListener("click", ()=>reset());
        document.getElementById("results-menu").addEventListener("click", ()=>window.location.href="../modes.html");
      }

      /* input */
      function checkForInput(){
        if(!gameStarted || inputListenerAttached) return;
        inputListenerAttached = true;

        document.addEventListener("keydown", (e)=>{ if(e.key===resetGame){reset();e.preventDefault();} });
        answerBox.addEventListener("keyup", (event) => {
          keypresses++;
          if(paused) return;
          if(problemPhase==="reading") switchPhase("typing");
          if(!timerStarted) startTimer();

          if(event.key===answerQuestion){
            event.preventDefault();
            if(Number(answerBox.value)===findAnswer()){
              let eq=parseInt(totalEquations||0)+1;
              localStorage.setItem("totalEquations",eq.toString()); totalEquations=eq.toString();
              firstNum=Math.floor(Math.random()*10); secondNum=Math.floor(Math.random()*10);
              switchPhase("reading");
              equationsLeft--; equationsCompleted++;
              counterElement.textContent=`Equations Left: ${equationsLeft}`;
              equationNum++;
              if(equationNum>7){equationNum=0;equationGenerate();}
              equationElement.textContent=displayEquation();
              if(keypresses===1) unlockAchievement("zero_input");

              if(equationsLeft<=0){
                clearInterval(timerInterval);
                let gp=parseInt(totalGames||0)+1; localStorage.setItem("totalGames",gp.toString());
                const pe=Date.now()-phaseStartTime;
                if(problemPhase==="typing") totalTypingTime+=pe;

                const finalTime=(Date.now()-startTime)/1000;
                const avgReadingTime=(totalReadingTime/equationsCompleted/1000).toFixed(2);
                const avgTypingTime =(totalTypingTime /equationsCompleted/1000).toFixed(2);

                let isPB=false;
                if(bestTime===null||finalTime<bestTime){
                  isPB=true; bestTime=finalTime;
                  localStorage.setItem("bestTime",bestTime.toString());
                  updateHighscoreDisplay();
                }

                if(finalTime<=40)     unlockAchievement("speed_demon");
                if(mistakes<=0)       unlockAchievement("perfect_score");
                if(avgReadingTime<0.8)unlockAchievement("brain");
                if(avgTypingTime<0.2) unlockAchievement("twitch");
                unlockAchievement("first_win");

                equationElement.innerHTML=`Sprint complete!`;
                answerBox.disabled=true; answerBox.value="";

                fetch(API+"/leaderboard")
                  .then(r=>{if(!r.ok)throw new Error('bad');return r.json();})
                  .then(data=>{
                    const u=localStorage.getItem("username");
                    if(data[0]&&data[0].name===u&&data[0].score===finalTime){record("WORLD RECORD");recordType=true;}
                    else for(let i=0;i<data.length;i++){
                      if(data[i].name===u&&data[i].score===finalTime){
                        if(i<3){record("TOP 3");recordType=true;break;}
                        else if(i<10){record("TOP 10");recordType=true;break;}
                      }
                    }
                    if(isPB&&!recordType) record("PERSONAL BEST");
                  })
                  .catch(err=>{console.error(err);if(isPB)record("PERSONAL BEST");})
                  .finally(()=>setTimeout(()=>showResultsScreen(finalTime,avgReadingTime,avgTypingTime,isPB),800));

                submitFinalScore(finalTime);
              }
            } else {
              mistakes++;
              paused=true;
              equationElement.innerHTML="Wrong answer<br>0.5 second penalty";
              setTimeout(()=>{paused=false;equationElement.textContent=displayEquation();},500);
            }
            keypresses=0; answerBox.value="";
          }
        });
      }

      /* reset button */
      function reset(){
        // remove results overlay and any record animations
        document.querySelectorAll(".results-overlay, .record, .second-record, .countdown-overlay")
          .forEach(el=>el.remove());

        // FIX: reset ALL stats so the next run starts clean
        equationsLeft = 40;
        equationsCompleted = 0;
        mistakes = 0;
        keypresses = 0;
        equationNum = 0;
        totalReadingTime = 0;
        totalTypingTime = 0;
        recordType = false;
        paused = false;
        problemPhase = "not started";

        clearInterval(timerInterval);
        timerStarted = false;
        timerElement.textContent = "Time: 0.00s";
        readingTimeElement.textContent = "Avg Read: 0.00s";
        typingTimeElement.textContent  = "Avg Type: 0.00s";
        apsElement.textContent = "APS: __.__";

        equationGenerate();
        answerBox.disabled = true;
        answerBox.value = "";

        runCountdown(()=>{
          answerBox.disabled = false;
          answerBox.focus();
          counterElement.textContent = `Equations Left: ${equationsLeft}`;
          equationElement.textContent = displayEquation();
          startTimer();
          // FIX: do NOT call checkForInput() again — listener is already attached
        });
      }

      let paused = false;

      window.addEventListener('load', ()=>{
        const bg=localStorage.getItem('customBackground');
        if(bg) document.body.style.backgroundImage=`url('${bg}')`;
      });

      const startButton = document.querySelector(".start-button");
      let equationElement, answerBox, timerElement, counterElement, apsElement, readingTimeElement, typingTimeElement, highScoreElement;

      startButton.addEventListener("click", ()=>{
        startGame();
        equationElement    = document.getElementById("equation");
        answerBox          = document.getElementById("answer_box");
        timerElement       = document.getElementById("timer");
        counterElement     = document.getElementById("counter");
        apsElement         = document.getElementById("aps");
        readingTimeElement = document.getElementById("reading-time");
        typingTimeElement  = document.getElementById("typing-time");
        highScoreElement   = document.getElementById("highscore");
        updateHighscoreDisplay();

        equationGenerate();
        equationElement.textContent="Loading...";
        answerBox.disabled=true;

        runCountdown(()=>{
          answerBox.disabled=false;
          answerBox.focus();
          startTimer();
          equationElement.textContent=displayEquation();
          checkForInput();
        });
      });
    </script>
  </body>

</html>
