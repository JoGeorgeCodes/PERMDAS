<!DOCTYPE html>
<html>

  <head>
    <script src="../config.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>40 equations SPRINT</title>
    <link href="../style.css" rel="stylesheet" type="text/css" />

    <style>
      .answer_box{
        display: block;
        width: 400px;
        height: 100px;
        margin: 50px auto 0;
        font-size: 20px;
        text-align: center;
        resize: none;
      }
      .header{
        text-align: center;
        font-size: 50px;
        font-family: "Courier New", Courier, monospace;
      }
      .equation{
        margin-top: 100px;
        text-align: center;
        font-size: 60px;
        font-family: "Courier New", Courier, monospace;
      }
      .timer{
        font-size: 25px;
        text-align: center;
        font-family: "Courier New", Courier, monospace;
      }
      .highscore{
        position: absolute;
        font-family: "Courier New", Courier, monospace;
        top: 60px;
        right: 16%;
        font-size: 25px;
      }
      .stat-box{
        position: absolute;
        top: 300px;
        right: 200px;
        width: 250px;
        height: 175px;
        text-align: left;
        font-size: 20px;
        font-family: "Courier New", Courier, monospace;
      }
      .box{
        position: fixed;
        top: 0;
        left: 10%;
        width: 80%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        z-index: -1;
      }
      .back{
        backdrop-filter: blur(10px);
        padding: 15px 50px 15px 80px;
        clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%);
        position: absolute;
        color: red;
        background-color:rgba(0, 0, 0, 0.3);
        top: 0px;
        left: -50px;
        font-size: 30px;
        border: none; 
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        z-index: 3;
        transition: all 0.3s ease;
      }
      .back:hover{
        transform: translateX(50px)
      }
      .menu-screen-info {
        position: fixed;
        left: 20%;
        width: 60%;
        height: 15%;
        font-size: 20px;
        font-family: "Courier New", Courier, monospace;
        background-color: rgb(204, 202, 76);
        z-index: 2;
        box-shadow: 2px 2px 5px black;

        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
      }
      .menu-screen-start{
        position: fixed;
        top: 20%;
        left: 20%;
        width: 60%;
        height: 15%;
        font-size: 20px;
        font-family: "Courier New", Courier, monospace;
        background-color: rgb(204, 202, 76);
        z-index: 2;
        box-shadow: 2px 2px 5px black;

        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
      }
      .menu-screen-options{
        position: fixed;
        top: 40%;
        left: 20%;
        width: 60%;
        height: 15%;
        font-size: 20px;
        font-family: "Courier New", Courier, monospace;
        background-color: rgb(204, 202, 76);
        z-index: 2;
        box-shadow: 2px 2px 5px black;

        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
      }
      .start-button{
        width: 150px;
        height: 50px;
        translate: 100px;
        background-color: rgb(237, 235, 83);
        border: 1px black solid;
        font-size: 30px;
        color: green;
        border-radius: 10px;
        box-shadow: 2px 2px 5px black;
        cursor: pointer;
        animation: shine 2s infinite alternate;
      }
      body {
        background-image: url("https://images.fineartamerica.com/images-medium-large-5/sunset-over-mountain-layers-maya-karkalicheva.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: white;
      }
      .record{
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 25px;
        color: yellow;
        font-family: 'Exo', sans-serif;
        animation: record 5s forwards;
        pointer-events: none;
      }
      .second-record{
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 25px;
        color: yellow;
        font-family: 'Exo', sans-serif;
        animation: secondRecord 5s forwards;
        pointer-events: none
      }
      @keyframes record{
        0% {transform: translate(-50%, -40%) scale(1); opacity:1;}
        50% {transform: translate(-50%, -40%) scale(5); opacity:0.5;}
        100% {transform: translate(-50%, -40%) scale(10); opacity:0;}
      }
      @keyframes secondRecord{
        0% {transform: translate(-50%, -40%) scale(1); opacity:0.5;}
        50% {transform: translate(-50%, -40%) scale(7.5); opacity:0.25;}
        100% {transform: translate(-50%, -40%) scale(15); opacity:0;}
      }
      @keyframes fadeOut{
        from{
          opacity: 1;
        }to{
          opacity: 0;
        }
      }
      @keyframes shine{
        from{
          background-color: rgb(240, 240, 80);
        }
        to{
          background-color: rgb(200, 200, 80)
        }
      }
    </style>
  </head>

  <body>
    <a href = "../modes.html"><button class = "back">Modes</button></a>
    <div class = "menu-screen-info" id = "menu-screen"><div style = "font-size: 30px; align-items: center;">40 Equation Sprint:<div><div style = "font-size: 20px;">Solve 40 equations as fast as you can!</div></div>
    <div class = "menu-screen-start" id = "menu-screen-start">Click to start:<button class = "start-button">START</button></div>
    <div class = "menu-screen-options" id = "menu-screen-options"><div style = "font-size: 30px;">Info:</div>-You may not submit to leaderboards without a password<br>-You can create a password in customization<br>-if you do not have a password, your password is blank</div>

    <script>
      let gameStarted = false;
      function startGame(){
        gameStarted = true;
        
        //removing menu thing
        const menu_screen_info = document.getElementById("menu-screen");
        menu_screen_info.style.animation = "fadeOut 1s ease forwards";
        const menu_screen_start = document.getElementById("menu-screen-start");
        menu_screen_start.style.animation = "fadeOut 1s ease forwards";
        const menu_screen_options = document.getElementById("menu-screen-options");
        menu_screen_options.style.animation = "fadeOut 1s ease forwards";

        menu_screen_info.addEventListener("animationend",()=>{
          menu_screen_info.remove();
        });
        menu_screen_start.addEventListener("animationend",()=>{
          menu_screen_start.remove();
        });
        menu_screen_options.addEventListener("animationend",()=>{
          menu_screen_options.remove();
        });

        const back_box = document.createElement("div");
        back_box.className = "box";
        document.body.appendChild(back_box);
        
        const title = document.createElement("h1");
        title.className = "header";
        title.textContent = "40 Equation Sprint";
        document.body.appendChild(title);

        const equationElement = document.createElement("p");
        equationElement.className = "equation";
        equationElement.id = "equation";
        document.body.appendChild(equationElement);

        const highscore = document.createElement("p");
        highscore.className = "highscore";
        highscore.id = "highscore";
        highscore.innerHTML = "Best Time: --";
        document.body.appendChild(highscore);

        const timer = document.createElement("p");
        timer.className = "timer";
        timer.id = "timer";
        timer.innerHTML = "Time: 0.00s";
        document.body.appendChild(timer);

        const statBox = document.createElement("div");
        statBox.className = "stat-box";
        document.body.appendChild(statBox);

        const readingTime = document.createElement("p");
        readingTime.id = "reading-time";
        readingTime.innerHTML = "Avg Read: 0.00s";
        statBox.appendChild(readingTime);

        const typingTime = document.createElement("p");
        typingTime.id = "typing-time";
        typingTime.innerHTML = "Avg Type: 0.00s";
        statBox.appendChild(typingTime);

        const aps = document.createElement("p");
        aps.id = "aps";
        aps.innerHTML = "APS: __.__";
        statBox.appendChild(aps);

        const counter = document.createElement("p");
        counter.id = "counter";
        counter.innerHTML = "Equations Left: 40";
        statBox.appendChild(counter);

        const answerBox = document.createElement("textarea");
        answerBox.className = "answer_box";
        answerBox.id = "answer_box";
        document.body.appendChild(answerBox);
        answerBox.focus();
      }
      
      if(localStorage.passwordHash == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"){
        //alert("You cannot submit scores to the leaderboard without a password, change your password in the customization menu")
      }
  
      function submitFinalScore(finalTime) {
        const username = localStorage.getItem("username");
      
        if (!username) {
          console.error("No username found in localStorage");
          return;
        }
      
        fetch(API + "/score", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: username,
            score: finalTime,
            passwordHash: localStorage.passwordHash
          })
        })
        .then(res => res.json())
        .then(data => {
          console.log("Score submitted:", data.user);
        })
        .catch(err => {
          console.error("Score submit failed:", err);
          alert("Score Submit failed: "+err)
        });
      }

      //high scores:
      let bestTime = localStorage.getItem("bestTime");
      if (bestTime !== null) {
         bestTime = Number(bestTime);
      }


      //let vars
      let sum = Math.floor(Math.random() * 10);
      
      let firstNum = Math.floor(Math.random() * sum);
      let secondNum = sum-firstNum;
      let equationsLeft = 40;
      let equationsCompleted = 0;
      let startTime = Date.now();
      let timerInterval;
      let timerStarted = false;
      let problemPhase = "not started";
      let phaseStartTime = Date.now();
      let totalReadingTime = 0;
      let totalTypingTime = 0;
      let mistakes = 0;
      let keypresses = 0;
      let recordType = false;

      //getting keybinds
      let answerQuestion = localStorage.getItem("answer_question");
      let resetGame = localStorage.getItem("reset_game");

      //getting stats
      let totalGames = localStorage.getItem("totalGames");
      let totalEquations = localStorage.getItem("totalEquations");
      
      //functions
      function updateAPS() {
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 0) {
          const aps = equationsCompleted / elapsed;
          apsElement.textContent = `APS: ${aps.toFixed(2)}`;
        }

        // Update average reading and typing times
        if (equationsCompleted > 0) {
          const avgReading = (totalReadingTime / equationsCompleted / 1000).toFixed(2);
          const avgTyping = (totalTypingTime / equationsCompleted / 1000).toFixed(2);
          readingTimeElement.textContent = `Avg Read: ${avgReading}s`;
          typingTimeElement.textContent = `Avg Type: ${avgTyping}s`;
        }
      }

      //generation and display functions
      let currentBag = [];
      let currentEquationsInBag = [];
      let operations = ["+", "-", "*", "/"];
      let currentOperator = operations[Math.floor(Math.random() * 4)];
      let equationNum = 0;
      function displayEquation(){
        //displaying
        switch(currentBag[equationNum]){
            case "+":
              return currentEquationsInBag[equationNum][0] +" + "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "-":
              return currentEquationsInBag[equationNum][0] +" - "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "*":
              return currentEquationsInBag[equationNum][0] +" × "+ currentEquationsInBag[equationNum][1]+" = ";
            break;
            case "/":
              return currentEquationsInBag[equationNum][0]*currentEquationsInBag[equationNum][1] +" ÷ "+ currentEquationsInBag[equationNum][1]+" = "
            break;
        }
      }
      function equationGenerate(){

        //generations
        currentBag = [];
        currentEquationsInBag = [];
        for(let i = 0; i < 8; i++){
          //generating the operators
          currentOperator = operations[Math.floor(Math.random() * 4)];
          currentBag.push(currentOperator);
          //generating the numbers
          if(currentOperator!== "/"&&currentOperator!== "*"){
            currentEquationsInBag.push([Math.floor(Math.random() * 10), Math.floor(Math.random() * 10)]);
            if(currentOperator==="-"){
              if(currentEquationsInBag[i][0]<currentEquationsInBag[i][1]){
                let temp = currentEquationsInBag[i][0];
                currentEquationsInBag[i][0] = currentEquationsInBag[i][1];
                currentEquationsInBag[i][1] = temp;
              }
            }
          }else{
            let num1 = Math.floor(Math.random() * 12);
            let num2 = Math.floor(Math.random() * 12);
            if(currentOperator==="/"){
              if(num1 === 0){num1 = 1;}
              if(num2 === 0){num2 = 1;}
            }
            currentEquationsInBag.push([num1, num2]);
          }
        }
      }
      function findAnswer(){
        switch(currentBag[equationNum]){
            case "+":
              return currentEquationsInBag[equationNum][0] + currentEquationsInBag[equationNum][1];
            break;
            case "-":
              return currentEquationsInBag[equationNum][0] - currentEquationsInBag[equationNum][1];
            break;
            case "*":
              return currentEquationsInBag[equationNum][0] * currentEquationsInBag[equationNum][1];
            break;
            case "/":
              return currentEquationsInBag[equationNum][0];
            break;
        }
      }
      function switchPhase(newPhase) {
        // Record time spent in current phase
        const phaseElapsed = Date.now() - phaseStartTime;

        if (problemPhase === "reading") {
          totalReadingTime += phaseElapsed;
        } else if (problemPhase === "typing") {
          totalTypingTime += phaseElapsed;
        }

        // Switch to new phase
        problemPhase = newPhase;
        phaseStartTime = Date.now();
      }
      function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        startTime = Date.now();
        phaseStartTime = startTime;
        switchPhase("reading");
        timerInterval = setInterval(() => {
          const elapsed = (Date.now() - startTime) / 1000;
          timerElement.textContent = `Time: ${elapsed.toFixed(2)}s`;
          updateAPS();
        }, 50); // updates 20 times per second

      }
      function updateHighscoreDisplay() {
        if (bestTime !== null) {
          highScoreElement.textContent = `Best Time: ${bestTime.toFixed(2)}s`;
        }
      }
      function unlockAchievement(achievementId) {
        let unlockedAchievements = JSON.parse(localStorage.getItem('unlockedAchievements') || '[]');
        if (!unlockedAchievements.includes(achievementId)) {
          unlockedAchievements.push(achievementId);
          localStorage.setItem('unlockedAchievements', JSON.stringify(unlockedAchievements));
        }
      }
      function record(text){
        const record = document.createElement("p");
        record.className = "record";
        record.textContent = text;
        document.body.appendChild(record);

        const secondRecord = document.createElement("p");
        secondRecord.className = "second-record";
        secondRecord.textContent = text;
        document.body.appendChild(secondRecord);
        console.log("Record animation created:", text);
      }
      function checkForInput(){
        if(gameStarted){
          document.addEventListener("keydown", (event) =>{
             if (event.key === resetGame){
               location.reload();
               event.preventDefault();
             }
          });
          answerBox.addEventListener("keyup", (event) => {
            keypresses++;
            if (paused) return;
  
            // Switch to typing phase when user starts typing
            if (problemPhase === "reading") {
              switchPhase("typing");
            }
  
            if (!timerStarted){
              startTimer();
            }
  
            if (event.key === answerQuestion) {
              event.preventDefault();
  
              if (Number(answerBox.value) === findAnswer()) {
                let equationsComp = parseInt(totalEquations || 0) + 1;
                localStorage.setItem("totalEquations", equationsComp.toString());
                totalEquations = equationsComp.toString();
                firstNum = Math.floor(Math.random()*10);
                secondNum = Math.floor(Math.random()*10);
                switchPhase("reading");
                equationElement.textContent = displayEquation();
                equationsLeft--;
                equationsCompleted++;
                counterElement.textContent = `Equations Left: ${equationsLeft}`;
                equationNum++;
                if(equationNum>7){
                  equationNum = 0;
                  equationGenerate();
                }
                equationElement.textContent = displayEquation();
                //0-int achievement
                if(keypresses === 1){
                  unlockAchievement("zero_input");
                }
  
                if (equationsLeft <= 0) {
                  clearInterval(timerInterval);
  
                  // adding total games
                  let gamesPlayed = parseInt(totalGames || 0) + 1;
                  localStorage.setItem("totalGames", gamesPlayed.toString());
  
                  // Record final phase time
                  const phaseElapsed = Date.now() - phaseStartTime;
                  if (problemPhase === "typing") {
                    totalTypingTime += phaseElapsed;
                  }
  
                  //high score stuff
                  const finalTime = (Date.now() - startTime) / 1000;
  
                  // Check leaderboard position
                  fetch(API + "/leaderboard")
                    .then(res => {
                      if (!res.ok) throw new Error('Network response was not ok');
                      return res.json();
                    })
                    .then(data => {
                      const username = localStorage.getItem("username");
  
                      // Check for world record
                      if(data[0] && data[0].name === username && data[0].score === finalTime){
                        record("WORLD RECORD");
                        recordType = true;
                      }
                      // Check for top 3
                      else {
                        for(let i = 0; i < data.length; i++){
                          if(data[i].name === username && data[i].score === finalTime){
                            if(i < 3){
                              record("TOP 3");
                              recordType = true;
                              break;
                            }
                            else if(i < 10){
                              record("TOP 10");
                              recordType = true;
                              break;
                            }
                          }
                        }
                      }
  
                      //check for personal best
                      if (bestTime === null || finalTime < bestTime) {
                        bestTime = finalTime;
                        if(!recordType){
                          record("PERSONAL BEST");
                        }
                        localStorage.setItem("bestTime", bestTime.toString());
                        updateHighscoreDisplay();
                      }
  
                      console.log("Leaderboard data:", data);
                    })
                    .catch(err => {
                      console.error("Sprint leaderboard fetch failed:", err);
  
                      //if agnis server does a kamakazi
                      if (bestTime === null || finalTime < bestTime) {
                        bestTime = finalTime;
                        record("PERSONAL BEST");
                        localStorage.setItem("bestTime", bestTime.toString());
                        updateHighscoreDisplay();
                      }
                    });
  
                  submitFinalScore(finalTime);
  
                  // Display stats
                  const avgReadingTime = (totalReadingTime / equationsCompleted / 1000).toFixed(2);
                  const avgTypingTime = (totalTypingTime / equationsCompleted / 1000).toFixed(2);
  
                  //achievements
                  if(finalTime <= 40){unlockAchievement("speed_demon");}
                  if(mistakes <= 0){unlockAchievement("perfect_score");}
                  if(avgReadingTime < 0.8){unlockAchievement("brain");}
                  if(avgTypingTime < 0.2){unlockAchievement("twitch");}
                  unlockAchievement("first_win");
  
                  equationElement.innerHTML = `Sprint complete!<br>Final Time: ${finalTime.toFixed(2)}s`;
                  equationElement.style.fontSize = "40px";
                  answerBox.disabled = true;
                  answerBox.value = "";
  
                }
  
              } else {
                mistakes++;
                paused = true;
                equationElement.innerHTML = "Wrong answer<br>0.5 second penalty";
                setTimeout(() => {
                  paused = false;
                  equationElement.textContent = displayEquation();
                }, 500);
              }
              keypresses = 0;
              answerBox.value = "";
            }
          });
        }
      }
      let paused = false;
      //checking for reset
      window.addEventListener('load', () => {
        const savedBg = localStorage.getItem('customBackground');
        if (savedBg) {
          document.body.style.backgroundImage = `url('${savedBg}')`;
        }
      });
      //start button and stuff
      const startButton = document.querySelector(".start-button");

      //stuff
      let equationElement;
      let answerBox;
      let timerElement;
      let counterElement;
      let apsElement;
      let readingTimeElement;
      let typingTimeElement;
      let highScoreElement;
      
      startButton.addEventListener("click", () =>{
        //starting
        startGame();
        
        //declaration
        equationElement = document.getElementById("equation");
        answerBox = document.getElementById("answer_box");
        timerElement = document.getElementById("timer");
        counterElement = document.getElementById("counter");
        apsElement = document.getElementById("aps");
        readingTimeElement = document.getElementById("reading-time");
        typingTimeElement = document.getElementById("typing-time");
        highScoreElement = document.getElementById("highscore");
        updateHighscoreDisplay();
        
        //generation
        equationGenerate();
        startTimer();
        equationElement.textContent = displayEquation();
        console.log(gameStarted);
        checkForInput();
      });
    </script>
  </body>

</html>
